version: '3.8'

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: peti
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-petidev}
      POSTGRES_DB: peti
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peti"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
